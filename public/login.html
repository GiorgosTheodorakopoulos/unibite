<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Σύνδεση – UniBite</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .auth-wrap { display:flex; justify-content:center; align-items:center; min-height:calc(100vh - 60px); padding:2rem 1rem; }
    .auth-card { width:100%; max-width:420px; background:#fff; border-radius:16px; padding:2rem; box-shadow:0 4px 24px rgba(0,0,0,.1); }
    .auth-logo { text-align:center; font-size:2.5rem; margin-bottom:.25rem; }
    .auth-title { text-align:center; font-size:1.4rem; font-weight:700; color:var(--dark); margin-bottom:1.5rem; }
    .auth-footer { text-align:center; margin-top:1rem; font-size:.88rem; color:var(--text-muted); }
    .auth-footer a { color:var(--primary); text-decoration:none; font-weight:600; }
    .role-options { display:grid; grid-template-columns:1fr 1fr; gap:.75rem; }
    .role-card { border:2px solid var(--border); border-radius:10px; padding:1rem; cursor:pointer; text-align:center; transition:border-color .15s, background .15s; }
    .role-card input[type=radio] { display:none; }
    .role-card:has(input:checked) { border-color:var(--primary); background:#fff8f0; }
    .role-card .role-icon { font-size:2rem; }
    .role-card .role-name { font-weight:600; margin-top:.3rem; }
  </style>
</head>
<body>
  <nav id="navbar"></nav>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">🍽️</div>
      <h1 class="auth-title">Σύνδεση στο UniBite</h1>
      <form id="loginForm" novalidate autocomplete="off">
        <div class="form-group">
          <label for="email">Email <span class="required">*</span></label>
          <input class="form-control" type="email" id="email" name="email" placeholder="you@university.gr" required autocomplete="off" />
        </div>
        <div class="form-group">
          <label for="password">Κωδικός <span class="required">*</span></label>
          <input class="form-control" type="password" id="password" name="password" placeholder="••••••••" required autocomplete="new-password" />
        </div>
        <div class="form-group">
          <label>Σύνδεση ως <span class="required">*</span></label>
          <div class="role-options">
            <label class="role-card">
              <input type="radio" name="role" value="consumer" />
              <div class="role-icon">🍽️</div>
              <div class="role-name">Καταναλωτής</div>
            </label>
            <label class="role-card">
              <input type="radio" name="role" value="cook" />
              <div class="role-icon">👨‍🍳</div>
              <div class="role-name">Μάγειρας</div>
            </label>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Σύνδεση</button>
      </form>
      <p class="auth-footer">Δεν έχεις λογαριασμό; <a href="/register.html">Εγγράψου</a></p>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script>
    renderNavbar('login');
    if (API.getUser()) window.location.href = '/index.html';

    window.addEventListener('pageshow', () => {
      document.getElementById('loginForm').reset();
    });

    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      btn.disabled = true; btn.textContent = 'Σύνδεση...';
      const role = document.querySelector('input[name="role"]:checked')?.value;
      try {
        const { token, user } = await API.post('/api/auth/login', {
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
          ...(role && { role })
        });
        API.setAuth(token, user);
        window.location.href = user.role === 'admin' ? '/admin.html' : '/index.html';
      } catch(err) {
        showToast(err.message, 'error');
        btn.disabled = false; btn.textContent = 'Σύνδεση';
      }
    });
  </script>
</body>
</html>
