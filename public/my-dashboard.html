<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard – UniBite</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/dashboard.css" />
</head>
<body>
  <nav id="navbar"></nav>

  <div class="page-container">
    <h1 class="page-title">📊 Dashboard</h1>

    <!-- Points card -->
    <div id="pointsCard" class="points-card card">
      <div class="points-value" id="pointsValue">–</div>
      <div class="points-label">Πόντοι σου</div>
    </div>

    <!-- Tabs -->
    <div class="tabs" id="dashTabs">
      <button class="tab-btn active" data-tab="myListings">📢 Αγγελίες μου</button>
      <button class="tab-btn" data-tab="incoming">📥 Αιτήματα (Μάγειρας)</button>
      <button class="tab-btn" data-tab="myRequests">🍽️ Αιτήματά μου</button>
      <button class="tab-btn" data-tab="ratingsPending">⭐ Αξιολογήσεις</button>
    </div>

    <!-- Tab: My Listings -->
    <div class="tab-panel active" id="myListings">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem">
        <h2 class="section-title" style="margin:0">Οι αγγελίες μου</h2>
        <a href="/create-listing.html" class="btn btn-primary btn-sm">+ Νέα Αγγελία</a>
      </div>
      <div id="myListingsContent"><div class="spinner"></div></div>
    </div>

    <!-- Tab: Incoming Requests (Cook) -->
    <div class="tab-panel" id="incoming">
      <h2 class="section-title">Αιτήματα για τις αγγελίες μου</h2>
      <div id="incomingContent"><div class="spinner"></div></div>
    </div>

    <!-- Tab: My Requests (Consumer) -->
    <div class="tab-panel" id="myRequests">
      <h2 class="section-title">Τα αιτήματά μου</h2>
      <div id="myRequestsContent"><div class="spinner"></div></div>
    </div>

    <!-- Tab: Pending Ratings -->
    <div class="tab-panel" id="ratingsPending">
      <h2 class="section-title">Αξιολογήσεις προς συμπλήρωση</h2>
      <p class="hint">Έχεις 48 ώρες για να αξιολογήσεις μετά την παραλαβή, αλλιώς χάνεις 1 πόντο.</p>
      <div id="ratingsContent"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- Edit Modal -->
  <div id="editModal" class="modal-overlay" style="display:none">
    <div class="modal-card">
      <h2 class="section-title">Επεξεργασία Αγγελίας</h2>
      <form id="editForm" novalidate>
        <input type="hidden" id="editId" />
        <div class="form-group"><label>Τίτλος</label><input class="form-control" id="editTitle" required /></div>
        <div class="form-group"><label>Μερίδες</label><input class="form-control" type="number" id="editPortions" min="1" required /></div>
        <div class="form-group"><label>Σημείο Παράδοσης</label><input class="form-control" id="editLocation" required /></div>
        <div class="form-group"><label>Ώρα Παραλαβής</label><input class="form-control" type="time" id="editPickupTime" required /></div>
        <div class="form-group"><label>Σημειώσεις</label><textarea class="form-control" id="editNotes" rows="2"></textarea></div>
        <div style="display:flex;gap:.5rem;justify-content:flex-end;margin-top:1rem">
          <button type="button" class="btn btn-secondary" id="closeModal">Ακύρωση</button>
          <button type="submit" class="btn btn-primary">Αποθήκευση</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
